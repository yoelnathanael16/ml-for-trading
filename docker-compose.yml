services:
  verify:
    build: .
    command: python tests/verification.py
    environment:
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src

  dashboard:
    build: .
    command: streamlit run src/ui/dashboard.py --server.address 0.0.0.0 --server.port 8501
    environment:
      PYTHONPATH: /app
      API_BASE: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
